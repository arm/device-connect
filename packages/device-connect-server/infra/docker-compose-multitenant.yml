# Multi-tenant infrastructure: NATS (JWT auth) + etcd + device registry.
#
# Prerequisites:
#   cd ../security_infra
#   ./setup_deployment.sh --nats-host <PUBLIC_HOST>
#   ./manage_tenants.sh create-batch alpha,beta,gamma --devices 5 --nats-host <PUBLIC_HOST>
#
# Usage:
#   # Set DC_TENANTS to match your created tenants (comma-separated):
#   DC_TENANTS=alpha,beta,gamma docker compose -f infra/docker-compose-multitenant.yml up -d
#
#   # Or use an .env file:
#   cp infra/.env.multitenant.example infra/.env
#   # Edit .env, then:
#   docker compose -f infra/docker-compose-multitenant.yml up -d

services:
  nats:
    image: nats:2.10-alpine
    container_name: dc-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ../security_infra/nats-jwt-generated.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - dc-net
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: dc-etcd
    environment:
      ETCD_NAME: etcd0
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: dc-cluster
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dc-net
    restart: unless-stopped

  device-registry-service:
    build:
      context: ../../..
      dockerfile: packages/device-connect-server/device_connect_server/registry/service/Dockerfile
    container_name: dc-registry
    environment:
      TENANTS: ${DC_TENANTS:-default}
      MESSAGING_BACKEND: nats
      NATS_URL: nats://nats:4222
      NATS_CREDENTIALS_FILE: /app/credentials/registry.creds.json
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
    volumes:
      - ~/.device-connect/credentials:/app/credentials:ro
    depends_on:
      nats:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - dc-net
    restart: unless-stopped

networks:
  dc-net:
    driver: bridge
