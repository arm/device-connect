# Multi-tenant infrastructure: MQTT (Mosquitto password + ACL) + etcd + device registry.
#
# Prerequisites:
#   Bootstrap via the portal UI (Admin > Setup > select MQTT)
#
# Usage:
#   DC_TENANTS=alpha,beta,gamma docker compose -f infra/docker-compose-multitenant-mqtt.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dc-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ../security_infra/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../security_infra/mosquitto_passwd:/mosquitto/config/mosquitto_passwd:ro
      - ../security_infra/mosquitto_acl:/mosquitto/config/mosquitto_acl:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 2 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - dc-net
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: dc-etcd
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: dc-cluster
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dc-net
    restart: unless-stopped

  device-registry-service:
    build:
      context: ../../..
      dockerfile: packages/device-connect-server/device_connect_server/registry/service/Dockerfile
    container_name: dc-registry
    environment:
      TENANTS: ${DC_TENANTS:-default}
      MESSAGING_BACKEND: mqtt
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_CREDENTIALS_FILE: /app/credentials/registry.creds.json
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
    volumes:
      - ~/.device-connect/credentials:/app/credentials:ro
    depends_on:
      mosquitto:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - dc-net
    restart: unless-stopped

  portal:
    build:
      context: ../../..
      dockerfile: packages/device-connect-server/device_connect_server/portal/Dockerfile
    container_name: dc-portal
    ports:
      - "8080:8080"
    environment:
      MESSAGING_BACKEND: mqtt
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: "1883"
      MQTT_CONTAINER: dc-mosquitto
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
      ADMIN_USER: ${ADMIN_USER:-admin}
      # ADMIN_PASS: set via env var or .env file; auto-generated if omitted
      SECURITY_INFRA_DIR: /app/security_infra
      CREDS_DIR: /root/.device-connect/credentials
    volumes:
      - ~/.device-connect/credentials:/root/.device-connect/credentials
      - ../security_infra:/app/security_infra:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      mosquitto:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - dc-net
    restart: unless-stopped

volumes:
  etcd-data:
  mosquitto-data:
  mosquitto-log:

networks:
  dc-net:
    driver: bridge
