# Multi-tenant infrastructure: Zenoh (mTLS + ACL) + etcd + device registry.
#
# Prerequisites:
#   Bootstrap via the portal UI (Admin > Setup > select Zenoh),
#   or manually:
#     cd ../security_infra
#     # Generate CA, router cert, and privileged certs with openssl
#
# Usage:
#   DC_TENANTS=alpha,beta,gamma docker compose -f infra/docker-compose-multitenant-zenoh.yml up -d

services:
  zenoh:
    image: eclipse/zenoh:latest
    container_name: dc-zenoh
    command:
      - "--no-multicast-scouting"
      - "--config"
      - "/config/zenoh-config.json5"
    ports:
      - "7447:7447"
    volumes:
      # Per-file mounts (not the whole security_infra dir) so the CA *private*
      # key (ca-key.pem) and every tenant's device keys stay out of the
      # router container. It only needs the root CA cert + its own server
      # keypair. Requires bootstrap to have generated these files first (as the
      # README/compose prerequisites already state).
      - ../security_infra/ca.pem:/certs/ca.pem:ro
      - ../security_infra/zenoh-cert.pem:/certs/zenoh-cert.pem:ro
      - ../security_infra/zenoh-key.pem:/certs/zenoh-key.pem:ro
      - ../security_infra/zenoh-config.json5:/config/zenoh-config.json5:ro
    # The eclipse/zenoh image is BusyBox/Alpine-based: no bash (so no
    # /dev/tcp) and its nc has no -z flag. Probe the TLS port by opening a
    # short-lived connection with BusyBox nc instead.
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -w2 127.0.0.1 7447 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - dc-net
    restart: unless-stopped

  # Least-privilege reload broker. This is the ONLY container with the Docker
  # socket; its sole job is to restart the router when the portal requests a
  # reload (Zenoh ACL can't hot-reload). It debounces bursts (many
  # provisions/revokes -> one restart) and has no network access at all.
  zenoh-reloader:
    image: docker:27-cli
    container_name: dc-zenoh-reloader
    environment:
      ZENOH_CONTAINER: dc-zenoh
      ZENOH_RELOAD_SIGNAL: /reload/request
      RELOAD_DEBOUNCE: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - reload-signal:/reload
    network_mode: none
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        SIGNAL="$${ZENOH_RELOAD_SIGNAL:-/reload/request}"
        DEBOUNCE="$${RELOAD_DEBOUNCE:-2}"
        CONTAINER="$${ZENOH_CONTAINER:-dc-zenoh}"
        LAST=""
        [ -f "$$SIGNAL" ] && LAST="$$(cat "$$SIGNAL")"
        echo "zenoh-reloader: watching $$SIGNAL (debounce $${DEBOUNCE}s) target $$CONTAINER"
        while true; do
          if [ -f "$$SIGNAL" ]; then
            CUR="$$(cat "$$SIGNAL")"
            if [ "$$CUR" != "$$LAST" ]; then
              sleep "$$DEBOUNCE"
              CUR="$$(cat "$$SIGNAL")"
              echo "zenoh-reloader: reload ($$CUR) -> restarting $$CONTAINER"
              docker restart "$$CONTAINER" >/dev/null 2>&1 && echo "  restarted" || echo "  restart FAILED"
              LAST="$$CUR"
            fi
          fi
          sleep 1
        done
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: dc-etcd
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: dc-cluster
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_AUTO_COMPACTION_MODE: periodic
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dc-net
    restart: unless-stopped

  device-registry-service:
    build:
      context: ../../..
      dockerfile: packages/device-connect-server/device_connect_server/registry/service/Dockerfile
    container_name: dc-registry
    # The privileged mTLS client key (registry-key.pem) is generated mode 0600
    # owned by root. The image's default non-root user can't read it, so the
    # Zenoh TLS link silently never establishes (open() returns optimistically
    # and retries forever) and the registry's queryables never reach the
    # router -> every device registration gets "no responders". Run as root so
    # it can read the key without weakening the 0600 perms. Scope is limited by
    # the per-file mounts below: even as root the registry sees only the CA
    # cert + its own keypair, never the CA private key or other devices' keys.
    user: "0:0"
    environment:
      TENANTS: ${DC_TENANTS:-default}
      MESSAGING_BACKEND: zenoh
      ZENOH_CONNECT: tls/zenoh:7447
      MESSAGING_TLS_CA_FILE: /certs/ca.pem
      MESSAGING_TLS_CERT_FILE: /certs/registry-cert.pem
      MESSAGING_TLS_KEY_FILE: /certs/registry-key.pem
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
    volumes:
      # Per-file mounts: the registry needs only the root CA cert and its own
      # client keypair, never the CA private key or any other device's keys.
      - ../security_infra/ca.pem:/certs/ca.pem:ro
      - ../security_infra/registry-cert.pem:/certs/registry-cert.pem:ro
      - ../security_infra/registry-key.pem:/certs/registry-key.pem:ro
      - ~/.device-connect/credentials:/app/credentials:ro
    depends_on:
      zenoh:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - dc-net
    restart: unless-stopped

  portal:
    build:
      context: ../../..
      dockerfile: packages/device-connect-server/device_connect_server/portal/Dockerfile
    container_name: dc-portal
    ports:
      - "8080:8080"
    environment:
      MESSAGING_BACKEND: zenoh
      ZENOH_HOST: ${ZENOH_HOST:-zenoh}
      ZENOH_PORT: "7447"
      ZENOH_CONTAINER: dc-zenoh
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
      ADMIN_USER: ${ADMIN_USER:-admin}
      # ADMIN_PASS: set via env var or .env file; auto-generated if omitted
      SECURITY_INFRA_DIR: /app/security_infra
      CREDS_DIR: /root/.device-connect/credentials
      ZENOH_RELOAD_SIGNAL: /reload/request
    volumes:
      - ~/.device-connect/credentials:/root/.device-connect/credentials
      - ../security_infra:/app/security_infra
      # The portal no longer holds the Docker socket (host-takeover lever).
      # It requests a router reload by bumping this shared signal file; the
      # privileged zenoh-reloader sidecar performs the actual restart.
      - reload-signal:/reload
    depends_on:
      zenoh:
        condition: service_healthy
      etcd:
        condition: service_healthy
    networks:
      - dc-net
    restart: unless-stopped

volumes:
  etcd-data:
  # Shared between the portal (writer) and the zenoh-reloader sidecar (reader)
  # to carry reload requests without giving the portal the Docker socket.
  reload-signal:

networks:
  dc-net:
    driver: bridge
