# Zenoh-based production infrastructure (TLS).
#
# Requires TLS certificates in security_infra/:
#   - ca.pem          (CA certificate)
#   - zenoh-cert.pem  (Zenoh router certificate)
#   - zenoh-key.pem   (Zenoh router private key)
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d

services:
  zenoh:
    image: eclipse/zenoh:latest
    container_name: aif-zenoh
    command:
      - "--no-multicast-scouting"
      - "--cfg"
      - |
        {
          "transport": {
            "link": {
              "tls": {
                "server_certificate": "/certs/zenoh-cert.pem",
                "server_private_key": "/certs/zenoh-key.pem",
                "root_ca_certificate": "/certs/ca.pem"
              }
            }
          },
          "listen": {
            "endpoints": ["tls/0.0.0.0:7447"]
          }
        }
    ports:
      - "7447:7447"
    volumes:
      - ../security_infra:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/7447' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_NAME: etcd0
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_AUTO_COMPACTION_MODE: periodic
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  device-registry-service:
    build:
      context: ..
      dockerfile: device_connect_server/registry/service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      TENANT: default
      MESSAGING_BACKEND: zenoh
      ZENOH_CONNECT: tls/zenoh:7447
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
      MESSAGING_TLS_CA_FILE: /certs/ca.pem
      MESSAGING_TLS_CERT_FILE: /certs/registry-cert.pem
      MESSAGING_TLS_KEY_FILE: /certs/registry-key.pem
    volumes:
      - ../security_infra:/certs:ro
    depends_on:
      zenoh:
        condition: service_healthy
      etcd:
        condition: service_healthy
