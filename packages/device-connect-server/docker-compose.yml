services:
  nats-jwt:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      # Long-form bind with create_host_path: false so docker fails loudly if
      # nats-jwt-generated.conf is missing instead of silently creating an
      # empty directory in its place (which causes NATS to crash-loop with
      # "is a directory"). Run security_infra/setup_deployment.sh first.
      - type: bind
        source: ./security_infra/nats-jwt-generated.conf
        target: /etc/nats/nats-jwt.conf
        read_only: true
        bind:
          create_host_path: false
    command: ["-c", "/etc/nats/nats-jwt.conf"]

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_NAME: etcd0
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_AUTO_COMPACTION_MODE: periodic
      ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  device-registry-service:
    build:
      context: .
      dockerfile: device_connect_server/registry/service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      TENANT: default
      NATS_URL: nats://nats-jwt:4222
      NATS_CREDENTIALS_FILE: /app/credentials/registry.creds.json
      ETCD_HOST: etcd
      ETCD_PORT: "2379"
    volumes:
      - ./security_infra/credentials:/app/credentials:ro
    depends_on:
      nats-jwt:
        condition: service_started
      etcd:
        condition: service_healthy
