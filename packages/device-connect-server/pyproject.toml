[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "device-connect-server"
version = "0.2.2"
description = "Device Connect — edge device runtime with Zenoh/NATS messaging, D2D communication, and IoT orchestration"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [
    {name = "Arm", email = "opensource@arm.com"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "device-connect-edge>=0.2.0",
    # nats-py, pydantic, nkeys, pyyaml are transitive via device-connect-edge
]

[project.optional-dependencies]
security = [
    "bcrypt>=4.0.0",
    "aiohttp>=3.9.0",
    "zeroconf>=0.131.0",
    "qrcode[pil]>=7.4.2",
]
telemetry = [
    "opentelemetry-api>=1.30.0",
    "opentelemetry-sdk>=1.30.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.30.0",
    "opentelemetry-exporter-otlp-proto-http>=1.30.0",
]
state = ["etcd3gw>=2.4.0,<3"]
logging = ["pymongo"]
mqtt = ["aiomqtt"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "device-connect-server[security]",
]
all = [
    "device-connect-server[security,telemetry,state,logging,mqtt,dev]",
]

[project.scripts]
devctl = "device_connect_server.devctl.cli:main"
statectl = "device_connect_server.statectl.cli:main"

[project.urls]
Homepage = "https://github.com/arm/device-connect"
Repository = "https://github.com/arm/device-connect.git"
Issues = "https://github.com/arm/device-connect/issues"
License = "https://github.com/arm/device-connect?tab=Apache-2.0-1-ov-file"
"Code of Conduct" = "https://github.com/arm/device-connect?tab=coc-ov-file"
Contributing = "https://github.com/arm/device-connect?tab=contributing-ov-file"
Security = "https://github.com/arm/device-connect?tab=security-ov-file"

[tool.setuptools.packages.find]
include = ["device_connect_server*"]
