[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "device-connect-server"
version = "0.1.0"
description = "Device Connect — edge device runtime with Zenoh/NATS messaging, D2D communication, and IoT orchestration"
requires-python = ">=3.11"
dependencies = [
    "device-connect-sdk>=0.1.0",
    # nats-py, pydantic, nkeys, pyyaml are transitive via device-connect-sdk
]

[project.optional-dependencies]
security = [
    "bcrypt>=4.0.0",
    "aiohttp>=3.9.0",
    "zeroconf>=0.131.0",
    "qrcode[pil]>=7.4.2",
]
telemetry = [
    "opentelemetry-api>=1.30.0",
    "opentelemetry-sdk>=1.30.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.30.0",
    "opentelemetry-exporter-otlp-proto-http>=1.30.0",
]
state = ["etcd3gw>=2.4.0,<3"]
logging = ["pymongo"]
mqtt = ["aiomqtt"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
]
all = [
    "device-connect-server[security,telemetry,state,logging,mqtt,dev]",
]

[project.scripts]
devctl = "device_connect_server.devctl.cli:main"
statectl = "device_connect_server.statectl.cli:main"

[tool.setuptools.packages.find]
include = ["device_connect_server*"]
