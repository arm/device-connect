[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "device-connect-sdk"
version = "0.1.1"
description = "Device Connect SDK — lightweight edge device runtime with Zenoh/NATS messaging and D2D communication"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [
    {name = "Arm", email = "opensource@arm.com"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "eclipse-zenoh>=1.0.0",
    "nats-py>=2.5.0,<3",
    "pydantic>=2.7.1,<3",
    "nkeys>=0.2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
zenoh = []  # Zenoh is now a core dependency; kept for backward compat
telemetry = [
    "opentelemetry-api>=1.30.0",
    "opentelemetry-sdk>=1.30.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.30.0",
    "opentelemetry-exporter-otlp-proto-http>=1.30.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "device-connect-sdk[telemetry]",
]

[project.urls]
Homepage = "https://github.com/arm/device-connect"
Repository = "https://github.com/arm/device-connect.git"
Issues = "https://github.com/arm/device-connect/issues"
License = "https://github.com/arm/device-connect?tab=Apache-2.0-1-ov-file"
"Code of Conduct" = "https://github.com/arm/device-connect?tab=coc-ov-file"
Contributing = "https://github.com/arm/device-connect?tab=contributing-ov-file"
Security = "https://github.com/arm/device-connect?tab=security-ov-file"

[tool.setuptools.packages.find]
include = ["device_connect_sdk*"]
