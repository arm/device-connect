[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "device-connect-sdk"
# rename this to ai_device_connect_sdk for consistency.
version = "0.1.0"
description = "Device Connect SDK — lightweight edge device runtime with Zenoh/NATS messaging and D2D communication"
requires-python = ">=3.11"
dependencies = [
    "eclipse-zenoh>=1.0.0",
    "nats-py>=2.5.0,<3",
    "pydantic>=2.7.1,<3",
    "nkeys>=0.2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
zenoh = []  # Zenoh is now a core dependency; kept for backward compat
telemetry = [
    "opentelemetry-api>=1.30.0",
    "opentelemetry-sdk>=1.30.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.30.0",
    "opentelemetry-exporter-otlp-proto-http>=1.30.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "device-connect-sdk[telemetry]",
]

[tool.setuptools.packages.find]
include = ["device_connect_sdk*"]
