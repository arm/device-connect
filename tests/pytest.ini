[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    integration: marks tests requiring Docker infrastructure (NATS, etcd, registry)
    llm: marks tests requiring a real LLM API key (OPENAI_API_KEY or ANTHROPIC_API_KEY)
    slow: marks tests taking > 30 seconds
    conformance: marks messaging backend conformance tests
    d2d: marks device-to-device communication tests

timeout = 120
log_cli = true
log_cli_level = INFO
