<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" width="540" height="140">
  <!-- Tessellated hexagon cluster — like a honeycomb chip layout -->
  <g transform="translate(56, 70)">
    <!-- Hex tile function: cx, cy, size -->
    <!-- Center hex (AI core - filled) -->
    <polygon points="0,-16 -14,-8 -14,8 0,16 14,8 14,-8" fill="#0091BD" opacity="0.75"/>

    <!-- Ring of 6 hexes around center (devices) -->
    <!-- Top -->
    <polygon points="0,-42 -14,-34 -14,-18 0,-10 14,-18 14,-34" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="-26" r="2.5" fill="#0091BD" opacity="0.45"/>

    <!-- Top-right -->
    <polygon points="24,-26 10,-18 10,-2 24,6 38,-2 38,-18" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.35"/>
    <circle cx="24" cy="-10" r="2.5" fill="#0091BD" opacity="0.5"/>

    <!-- Bottom-right -->
    <polygon points="24,6 10,14 10,30 24,38 38,30 38,14" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.3"/>
    <circle cx="24" cy="22" r="2.5" fill="#0091BD" opacity="0.45"/>

    <!-- Bottom -->
    <polygon points="0,22 -14,30 -14,46 0,54 14,46 14,30" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="38" r="2" fill="#0091BD" opacity="0.35"/>

    <!-- Bottom-left -->
    <polygon points="-24,6 -38,14 -38,30 -24,38 -10,30 -10,14" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.3"/>
    <circle cx="-24" cy="22" r="2.5" fill="#0091BD" opacity="0.45"/>

    <!-- Top-left -->
    <polygon points="-24,-26 -38,-18 -38,-2 -24,6 -10,-2 -10,-18" fill="none" stroke="#0091BD" stroke-width="1.5" opacity="0.35"/>
    <circle cx="-24" cy="-10" r="2.5" fill="#0091BD" opacity="0.5"/>

    <!-- Partial outer hexes (fading out) -->
    <polygon points="0,-68 -14,-60 -14,-44 0,-36 14,-44 14,-60" fill="none" stroke="#0091BD" stroke-width="0.8" opacity="0.1"/>
    <polygon points="48,-10 34,-2 34,14 48,22 62,14 62,-2" fill="none" stroke="#0091BD" stroke-width="0.8" opacity="0.1"/>
    <polygon points="-48,-10 -62,-2 -62,14 -48,22 -34,14 -34,-2" fill="none" stroke="#0091BD" stroke-width="0.8" opacity="0.1"/>
    <polygon points="48,22 34,30 34,46 48,54 62,46 62,30" fill="none" stroke="#0091BD" stroke-width="0.8" opacity="0.08"/>
    <polygon points="-48,22 -62,30 -62,46 -48,54 -34,46 -34,30" fill="none" stroke="#0091BD" stroke-width="0.8" opacity="0.08"/>

    <!-- Glow on center hex -->
    <polygon points="0,-20 -17,-10 -17,10 0,20 17,10 17,-10" fill="none" stroke="#0091BD" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- "device connect" text -->
  <text x="138" y="70" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#0091BD">Device</tspan><tspan fill="#333333"> Connect</tspan>
  </text>

  <!-- Tagline -->
  <text x="141" y="94" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" fill="#666666" letter-spacing="2" font-weight="500">
    CONNECT AI TO THE PHYSICAL WORLD
  </text>

  <!-- "by Arm" -->
  <text x="141" y="114" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#999999" letter-spacing="0.5">
    by <tspan font-weight="600" fill="#0091BD">Arm</tspan>
  </text>
</svg>
